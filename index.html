<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajniti Samachar AI</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+Devanagari:wght@400;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#1a1008;font-family:'Noto Sans Devanagari',sans-serif;}
nav{background:#1a1008;padding:15px;text-align:center;border-bottom:3px solid #c0392b;}
nav h1{color:white;font-family:'Playfair Display';margin:0;}
.container{max-width:800px;margin:auto;background:#faf6ee;padding:20px;min-height:100vh;}
.control{display:flex;gap:10px;margin-bottom:20px;}
input{flex:1;padding:10px;font-size:15px;}
button{padding:10px 18px;background:#1a1008;color:white;border:none;cursor:pointer;}
button:hover{background:#c0392b;}
.quick{margin-bottom:15px;}
.quick button{background:none;border:1px solid gray;color:gray;margin-right:6px;padding:5px 10px;font-size:12px;}
.news-card{background:white;border-left:4px solid #c0392b;padding:16px;margin-bottom:12px;}
.news-hl{font-family:'Playfair Display';font-size:18px;margin-bottom:5px;}
.news-en{font-style:italic;color:#666;font-size:13px;}
.loading{display:none;font-family:'Courier Prime';font-size:12px;color:gray;margin-bottom:10px;}
</style>
</head>

<body>

<nav>
<h1>राजनीति समाचार</h1>
</nav>

<div class="container">

<div class="control">
<input id="topic" placeholder="Topic likho (BJP, Modi, Elections)">
<button onclick="fetchNews()">News Lao</button>
</div>

<div class="quick">
<button onclick="setTopic('BJP latest news')">BJP</button>
<button onclick="setTopic('Congress news')">Congress</button>
<button onclick="setTopic('Modi government news')">Modi</button>
<button onclick="setTopic('India elections news')">Elections</button>
</div>

<div class="loading" id="loading">AI news fetch ho rahi hai...</div>

<div id="news"></div>

</div>

<script>

// YAHAN APNI GROQ API KEY DAALO
const GROQ_API_KEY = "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";

function setTopic(t){
document.getElementById("topic").value=t;
fetchNews();
}

async function fetchNews(){

const topic=document.getElementById("topic").value || "India politics";
document.getElementById("loading").style.display="block";

const prompt=`You are a bilingual political news reporter.
Give 5 latest political news about "${topic}"
Return ONLY JSON format:
{"headlines":[{"headline_hindi":"","headline_english":"","summary_hindi":"","summary_english":"","source":""}]}`;

try{

const response=await fetch("https://api.groq.com/openai/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+GROQ_API_KEY
},
body:JSON.stringify({
model:"llama3-70b-8192",
messages:[{role:"user",content:prompt}],
temperature:0.7
})
});

const data=await response.json();

let text=data.choices?.[0]?.message?.content || "";
text=text.replace(/```json|```/g,"");

const j=text.indexOf("{");
const k=text.lastIndexOf("}");

const parsed=JSON.parse(text.substring(j,k+1));
const news=parsed.headlines;

const div=document.getElementById("news");
div.innerHTML="";

news.forEach(n=>{

const card=document.createElement("div");
card.className="news-card";

card.innerHTML=`
<div class="news-hl">${n.headline_hindi}</div>
<div class="news-en">${n.headline_english}</div>
<p>${n.summary_hindi}</p>
<p class="news-en">${n.summary_english}</p>
`;

div.appendChild(card);

});

}catch(e){
alert("Error: "+e.message);
}

document.getElementById("loading").style.display="none";

}

</script>

</body>
</html>
