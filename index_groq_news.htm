<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>राजनीति समाचार — AI Political News</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Sans+Devanagari:wght@300;400;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
background:#1a1008;
font-family:'Noto Sans Devanagari',sans-serif;
margin:0;
}

.container{
max-width:800px;
margin:auto;
background:#faf6ee;
padding:20px;
min-height:100vh;
}

h1{
font-family:'Playfair Display',serif;
text-align:center;
}

.control{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:10px;
}

button{
padding:10px 18px;
background:#1a1008;
color:white;
border:none;
cursor:pointer;
}

.news-card{
background:white;
border-left:4px solid #c0392b;
padding:14px;
margin-bottom:12px;
}

.news-hl{
font-weight:bold;
font-size:17px;
}

.news-en{
font-style:italic;
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<div class="container">

<h1>राजनीति समाचार</h1>

<div class="control">
<input id="topic-input" placeholder="Topic likho (Modi, BJP, Elections)">
<button onclick="fetchNews()">News Lao</button>
</div>

<div id="news"></div>

</div>

<script>

// 🔑 YAHAN API KEY DAALO
const GROQ_API_KEY = "PASTE_YOUR_GROQ_API_KEY_HERE";

let newsData=[];

async function fetchNews(){

const topic=document.getElementById("topic-input").value || "India politics";

const prompt=`You are a bilingual Indian political news reporter.

Give 5 latest political news about "${topic}"

Respond ONLY JSON format:

{
"headlines":[
{
"headline_hindi":"",
"headline_english":"",
"summary_hindi":"",
"summary_english":"",
"source":""
}
]
}`;

const response=await fetch("https://api.groq.com/openai/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+GROQ_API_KEY
},

body:JSON.stringify({

model:"llama3-70b-8192",

messages:[
{role:"user",content:prompt}
],

temperature:0.7

})

});

const data=await response.json();

let text=data.choices?.[0]?.message?.content || "";

text=text.replace(/```json|```/g,"");

const j=text.indexOf("{");
const k=text.lastIndexOf("}");

const parsed=JSON.parse(text.substring(j,k+1));

newsData=parsed.headlines;

renderNews();

}

function renderNews(){

const div=document.getElementById("news");

div.innerHTML="";

newsData.forEach((n,i)=>{

const card=document.createElement("div");

card.className="news-card";

card.innerHTML=`
<div class="news-hl">${n.headline_hindi}</div>
<div class="news-en">${n.headline_english}</div>
<p>${n.summary_hindi}</p>
<p class="news-en">${n.summary_english}</p>
`;

div.appendChild(card);

});

}

</script>

</body>
</html>
